<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dimension-landmark-app</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.zIndex = '999999';
        div.style.backgroundColor = '#FF6384';
        div.style.color = 'white';
        div.style.padding = '16px';
        div.style.borderRadius = '8px';
        div.style.fontSize = '12px';
        div.style.fontFamily = 'monospace';
        div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
        div.innerHTML = '<h3 style="margin-top:0;font-size:14px;">🚨 浏览器运行时报错 (Runtime Error)</h3>' +
          '<p><strong>错误信息:</strong> ' + message + '</p>' +
          '<p><strong>文件来源:</strong> ' + source + ':' + lineno + ':' + colno + '</p>';
        document.body.appendChild(div);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.bottom = '10px';
        div.style.left = '10px';
        div.style.zIndex = '999999';
        div.style.backgroundColor = '#FF9F43';
        div.style.color = 'white';
        div.style.padding = '16px';
        div.style.borderRadius = '8px';
        div.style.fontSize = '12px';
        div.style.fontFamily = 'monospace';
        div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
        div.innerHTML = '<h3 style="margin-top:0;font-size:14px;">⚠️ 未处理的 Promise 拒绝 (Promise Rejection)</h3>' +
          '<p><strong>拒绝原因:</strong> ' + event.reason + '</p>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
